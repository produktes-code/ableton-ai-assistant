name: CI - Ableton AI Assistant

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest mcp
          if [ -f mcp-server/requirements.txt ]; then pip install -r mcp-server/requirements.txt; fi
      - name: Run python tests
        run: PYTHONPATH=remote-script python -m pytest tests/ remote-script/tests/ remote-script/AbletonAIAssistant -q

  electron-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./electron-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './electron-app/package-lock.json'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run electron tests
        run: npm test
